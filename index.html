<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- "hot base" mark (PYR3-044): double-arm vortex flame, amber→crimson gradient, black attractor heart -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23ffbe3e'/%3E%3Cstop offset='1' stop-color='%23bf2408'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2c4 7 8 9.5 6.5 17C21.4 25.8 11 26.5 9.6 19 8.5 13 13 10 16 2Z' fill='url(%23g)'/%3E%3Cpath d='M16 9.5c3.4 0 4 4 .8 5.2 M16 22c-3.4 0-4-4-.8-5.2' fill='none' stroke='%230a0a0c' stroke-width='2.3' stroke-linecap='round'/%3E%3C/svg%3E" />
    <title>pyr3 — fractal flame viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0c;
        --bar-bg-1: #15151a;
        --bar-bg-2: #1a1a20;
        --bar-bg-3: #0f0f13;
        --bar-border: #2a2a30;
        --accent: #ff8c1a;
        --accent-soft: rgba(255, 140, 26, 0.18);
        --accent-border: #884a1a;
        --text: #ddd;
        --text-dim: #888;
        --text-muted: #aaa;
        --ok: #9aff7a;
        --err: #ff7a7a;
      }

      /* Hide the canvas while the WebGPU fallback panel is mounted. */
      body.webgpu-unavailable #pyr3-canvas { display: none; }

      /* Gallery surface — sibling of the canvas; main.ts toggles `hidden`
         on both elements between viewer and gallery modes (#47, v1.2).
         Absolute-positioned within the canvas-zone (same pattern as
         #pyr3-missing) so the flex parent's center-align doesn't squeeze
         the grid container to content-width. The grid sizes to fit the
         viewport (no scroll — see .pyr3-gallery-grid max-width calc in
         gallery-mount.ts). */
      #pyr3-gallery {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #pyr3-gallery[hidden] { display: none; }

      /* /v1/edit surface — same sibling-of-canvas pattern as #pyr3-gallery.
         Edit mode hides the viewer canvas + bar and takes over the whole
         viewport area. */
      #pyr3-edit {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      #pyr3-edit[hidden] { display: none; }
      /* In edit mode the standard viewer chrome elements are hidden — the
         editor mounts its own bar (mountEditBar) into #pyr3-bar and takes
         over the canvas zone. */
      body.pyr3-edit-mode #pyr3-canvas,
      body.pyr3-edit-mode #pyr3-firstpaint,
      body.pyr3-edit-mode #pyr3-gallery,
      body.pyr3-edit-mode #pyr3-fallback,
      body.pyr3-edit-mode #pyr3-missing { display: none !important; }

      /* #176 — shared PREVIEW/RENDER bar. Mounted between the chrome bar
         and the canvas in the viewer; mounted above the canvas in the
         editor's canvasHost. Single horizontal row; overflows to scroll
         on narrow viewports (desktop priority for v1). */
      .pyr3-render-mode-bar {
        display: flex;
        align-items: center;
        height: 36px;
        padding: 0 12px;
        gap: 10px;
        background: var(--bar-bg-2);
        border-bottom: 1px solid var(--bar-border);
        font-size: 12px;
        color: var(--text);
        user-select: none;
        overflow-x: auto;
        white-space: nowrap;
      }
      .pyr3-render-mode-bar-preview {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        border-radius: 4px;
        background: linear-gradient(90deg, rgba(70, 140, 200, 0.10), rgba(70, 140, 200, 0.02));
        flex-shrink: 0;
      }
      .pyr3-render-mode-bar-render {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        border-radius: 4px;
        background: linear-gradient(90deg, rgba(255, 140, 26, 0.12), rgba(255, 140, 26, 0.02));
        flex-shrink: 0;
        margin-left: auto;  /* push RENDER cluster to the right edge */
      }
      .pyr3-render-mode-bar-divider {
        width: 1px;
        height: 32px;
        background: var(--bar-border);
        margin: 0 4px;
      }
      .pyr3-render-mode-bar-side-label {
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        font-weight: 600;
      }
      .pyr3-render-mode-bar-tier,
      .pyr3-render-mode-bar-preview-q,
      .pyr3-render-mode-bar-render-q {
        background: transparent;
        border: 1px solid var(--bar-border);
        color: var(--text);
        padding: 3px 7px;
        cursor: pointer;
        font: inherit;
        min-width: 32px;
      }
      .pyr3-render-mode-bar-tier.on,
      .pyr3-render-mode-bar-preview-q.on,
      .pyr3-render-mode-bar-render-q.on {
        background: var(--accent);
        color: #000;
        border-color: var(--accent);
      }
      .pyr3-render-mode-bar-tier:hover,
      .pyr3-render-mode-bar-preview-q:hover,
      .pyr3-render-mode-bar-render-q:hover {
        background: var(--accent-soft);
      }
      .pyr3-render-mode-bar-preset {
        background: var(--bar-bg-3);
        color: var(--text);
        border: 1px solid var(--bar-border);
        padding: 4px 8px;
        font: inherit;
      }
      .pyr3-render-mode-bar-w,
      .pyr3-render-mode-bar-h {
        width: 56px;
        background: var(--bar-bg-3);
        color: var(--text);
        border: 1px solid var(--bar-border);
        padding: 3px 6px;
        font: inherit;
        text-align: right;
      }
      /* Hide browser native spinner so the typed value isn't shoved left */
      .pyr3-render-mode-bar-w::-webkit-inner-spin-button,
      .pyr3-render-mode-bar-h::-webkit-inner-spin-button,
      .pyr3-render-mode-bar-w::-webkit-outer-spin-button,
      .pyr3-render-mode-bar-h::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .pyr3-render-mode-bar-q-input {
        width: 48px;
        background: var(--bar-bg-3);
        color: var(--text);
        border: 1px solid var(--bar-border);
        padding: 3px 6px;
        font: inherit;
        text-align: right;
      }
      .pyr3-render-mode-bar-x {
        color: var(--text-dim);
        padding: 0 2px;
      }
      .pyr3-render-mode-bar-tier-group,
      .pyr3-render-mode-bar-preview-q-group,
      .pyr3-render-mode-bar-render-q-group {
        display: inline-flex;
        gap: 2px;
      }
      .pyr3-render-mode-bar-preset-label {
        display: none;
      }
      .pyr3-render-mode-bar-save {
        background: var(--accent);
        color: #000;
        border: none;
        padding: 6px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        border-radius: 2px;
      }
      .pyr3-render-mode-bar-save:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .pyr3-render-mode-bar-save:hover:not(:disabled) {
        filter: brightness(1.1);
      }

      /* #176 — render-progress-modal: fixed full-viewport overlay during
         Save Render. */
      .pyr3-render-progress-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(0, 0, 0, 0.75);
        color: var(--text);
        font-size: 14px;
      }
      .pyr3-render-progress-modal-bar {
        width: 320px;
        height: 12px;
        background: var(--bar-bg-3);
        border-radius: 6px;
        overflow: hidden;
      }
      .pyr3-render-progress-modal-fill {
        height: 100%;
        background: var(--accent);
        transition: width 120ms linear;
      }
      .pyr3-render-progress-modal-cancel {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--bar-border);
        padding: 6px 16px;
        font: inherit;
        cursor: pointer;
        border-radius: 2px;
      }
      .pyr3-render-progress-modal-cancel:hover {
        background: var(--accent-soft);
      }

      /* #176 — Render section's bar-redirect subtitle in the editor panel. */
      .pyr3-edit-section-render__subtitle {
        font-size: 11px;
        color: var(--text-dim);
        font-style: italic;
        padding: 4px 8px 8px;
      }

      /* #176 — when the render-mode-bar is mounted, the chrome bar's
         duplicate Size + QUALITY + Save Render widgets hide. The chrome
         bar keeps Open / Save Flame / surprise me / nav arrows. */
      body.pyr3-has-render-mode-bar .pyr3-bar-size,
      body.pyr3-has-render-mode-bar .pyr3-bar-quality-label:not(.pyr3-bar-settle-label),
      body.pyr3-has-render-mode-bar .pyr3-bar-quality-group:not(.pyr3-bar-settle-group),
      body.pyr3-has-render-mode-bar .pyr3-bar-save-render {
        display: none !important;
      }
      /* #176 — with the chrome bar's duplicates hidden in the viewer, the
         surprise me + corpus-nav pills (dice + prev/next) drift right by
         default. Auto-margins center them as a group between actionLeft
         and the right edge. Editor (pyr3-edit-mode) keeps its left-anchored
         layout (no dice/nav in editor — selector simply doesn't fire). */
      body.pyr3-has-render-mode-bar:not(.pyr3-edit-mode) .pyr3-zone-actleft {
        flex: 0 0 auto;
      }
      body.pyr3-has-render-mode-bar:not(.pyr3-edit-mode) .pyr3-bar-viewer-dice {
        margin-left: auto;
      }
      body.pyr3-has-render-mode-bar:not(.pyr3-edit-mode) .pyr3-bar-nav {
        margin-right: auto;
      }

      /* #119 — /v1/variations surface. Same sibling-of-canvas pattern as
         #pyr3-edit / #pyr3-gallery. The catalog page mounts a sticky
         sidebar + scrollable catalog column inside this root. */
      #pyr3-variations {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 14px;
      }
      #pyr3-variations[hidden] { display: none; }
      body.pyr3-variations-mode #pyr3-canvas,
      body.pyr3-variations-mode #pyr3-firstpaint,
      body.pyr3-variations-mode #pyr3-gallery,
      body.pyr3-variations-mode #pyr3-fallback,
      body.pyr3-variations-mode #pyr3-missing { display: none !important; }
      /* Hide the viewer's info + action rows on the catalog — Open / Size /
         Quality / Save Flame / Save Render / surprise-me don't apply to
         the catalog browse surface (only the top nav tab strip stays). */
      body.pyr3-variations-mode .pyr3-bar-info,
      body.pyr3-variations-mode .pyr3-bar-action { display: none !important; }

      /* Two-pane layout: sticky 280px sidebar on the left, scrollable
         catalog column on the right. */
      .pyr3-variations-root {
        display: flex;
        height: 100%;
        width: 100%;
      }
      .pyr3-cat-sidebar {
        flex: 0 0 280px;
        height: 100%;
        background: var(--bar-bg-1);
        border-right: 1px solid var(--bar-border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .pyr3-cat-sidebar-head {
        padding: 0.85rem 1rem 0.6rem;
        border-bottom: 1px solid var(--bar-border);
        background: var(--bar-bg-2);
      }
      .pyr3-cat-sidebar-title {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        color: var(--text-dim);
        text-transform: uppercase;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .pyr3-cat-sidebar-count {
        color: var(--accent);
        font-weight: 600;
        letter-spacing: 0;
      }
      .pyr3-cat-search-wrap {
        padding: 0.7rem 1rem 0.7rem;
        position: relative;
      }
      .pyr3-cat-search {
        width: 100%;
        background: var(--bar-bg-3);
        color: var(--text);
        border: 1px solid var(--bar-border);
        border-radius: 3px;
        padding: 0.45rem 0.6rem;
        font-family: ui-monospace, monospace;
        font-size: 0.82rem;
        outline: none;
        transition: border-color 0.12s;
      }
      .pyr3-cat-search:focus { border-color: var(--accent-border); }
      .pyr3-cat-search::placeholder { color: var(--text-dim); font-style: italic; }
      .pyr3-cat-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 0 0.6rem;
        scrollbar-width: thin;
        scrollbar-color: var(--bar-border) transparent;
        border-top: 1px solid var(--bar-border);
      }
      .pyr3-cat-list::-webkit-scrollbar { width: 6px; }
      .pyr3-cat-list::-webkit-scrollbar-thumb { background: var(--bar-border); border-radius: 3px; }
      .pyr3-cat-group-head {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        padding: 0.55rem 1rem 0.55rem 0.85rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        border-bottom: 1px solid var(--bar-border);
        background: var(--bar-bg-1);
        cursor: pointer;
        user-select: none;
        position: sticky;
        top: 0;
        z-index: 2;
        transition: color 0.12s, background 0.12s;
      }
      .pyr3-cat-group-head:hover { color: var(--text); background: var(--bar-bg-2); }
      .pyr3-cat-gct { color: var(--text-dim); font-size: 0.92em; font-weight: 400; }
      .pyr3-cat-trigger { display: inline-flex; align-items: center; gap: 0.4rem; }
      .pyr3-cat-caret {
        font-size: 0.75rem;
        width: 0.85rem;
        text-align: center;
        transition: transform 0.18s ease;
        color: var(--text-dim);
      }
      .pyr3-cat-group-head.collapsed .pyr3-cat-caret { transform: rotate(-90deg); }
      .pyr3-cat-item {
        display: grid;
        grid-template-columns: 2.6rem 1fr auto;
        align-items: center;
        gap: 0.5rem;
        padding: 0.3rem 1rem;
        font-family: ui-monospace, monospace;
        font-size: 0.83rem;
        color: var(--text-muted);
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: background 0.08s, color 0.08s;
        text-decoration: none;
      }
      .pyr3-cat-item:hover { background: var(--bar-bg-2); color: var(--text); }
      .pyr3-cat-vnum { color: var(--text-dim); font-size: 0.78rem; }
      .pyr3-cat-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .pyr3-cat-badge {
        font-size: 0.62rem;
        color: var(--text-dim);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .pyr3-cat-item.active {
        background: var(--accent-soft);
        color: var(--text);
        border-left-color: var(--accent);
      }
      .pyr3-cat-item.active .pyr3-cat-vnum { color: var(--accent); }
      .pyr3-cat-empty {
        padding: 1.5rem 1rem;
        text-align: center;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        color: var(--text-dim);
        font-style: italic;
      }
      .pyr3-cat-catalog {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--bar-border) transparent;
      }
      .pyr3-cat-catalog::-webkit-scrollbar { width: 8px; }
      .pyr3-cat-catalog::-webkit-scrollbar-thumb { background: var(--bar-border); border-radius: 4px; }

      /* Catalog column inner content — sections + stubs */
      .pyr3-cat-catalog > * { max-width: 880px; margin: 0 auto; padding-left: 2rem; padding-right: 2rem; }
      .pyr3-cat-section {
        padding-top: 2.5rem;
        padding-bottom: 2.5rem;
        border-bottom: 1px solid var(--bar-border);
        scroll-margin-top: 1rem;
      }
      .pyr3-cat-section:last-of-type { border-bottom: 0; }
      .pyr3-cat-section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.25rem;
      }
      .pyr3-cat-section-name {
        font-family: ui-monospace, monospace;
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--text);
      }
      .pyr3-cat-section-vnum {
        color: var(--text-dim);
        font-weight: 400;
        margin-left: 0.35rem;
      }
      .pyr3-cat-section-anchor {
        color: var(--text-muted);
        font-family: ui-monospace, monospace;
        font-weight: 400;
        font-size: 0.95rem;
        text-decoration: none;
        margin-left: 0.55rem;
        opacity: 0;
        transition: opacity 120ms, color 120ms;
        cursor: pointer;
      }
      .pyr3-cat-section-head:hover .pyr3-cat-section-anchor,
      .pyr3-cat-section-anchor:focus-visible {
        opacity: 0.7;
      }
      .pyr3-cat-section-anchor:hover {
        opacity: 1;
        color: var(--accent, #f7a23a);
      }
      .pyr3-cat-section-anchor.copied {
        opacity: 1;
        color: var(--accent, #f7a23a);
      }
      .pyr3-cat-section-anchor.copied::after {
        content: ' copied';
        font-size: 0.7rem;
        margin-left: 0.3rem;
        color: var(--text-muted);
      }
      .pyr3-cat-section-pills {
        display: flex;
        align-items: baseline;
        gap: 0.45rem;
        flex-shrink: 0;
      }
      .pyr3-cat-section-source {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        color: var(--text-muted);
        background: var(--bar-bg-1);
        border: 1px solid var(--bar-border);
        padding: 0.22rem 0.6rem;
        border-radius: 999px;
        white-space: nowrap;
      }
      /* #222 — Direct-Color capability pill: accent-bordered, links to the
         explainer. Distinct from the muted provenance pill so the "this one
         paints its own color" signal reads at a glance. */
      .pyr3-cat-section-dc {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        color: var(--accent);
        background: var(--bar-bg-1);
        border: 1px solid var(--accent);
        padding: 0.22rem 0.6rem;
        border-radius: 999px;
        text-decoration: none;
        white-space: nowrap;
        transition: background 120ms, color 120ms;
      }
      .pyr3-cat-section-dc:hover,
      .pyr3-cat-section-dc:focus-visible {
        background: var(--accent);
        color: var(--bg);
      }
      .pyr3-cat-section-dc-arrow { margin-left: 0.3rem; font-size: 0.85em; }
      .pyr3-cat-section-formula {
        text-align: center;
        padding: 1.3rem 0 1.5rem;
        font-size: 1.02rem;
        color: var(--text);
      }
      .pyr3-cat-section-panes {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .pyr3-cat-col { display: flex; flex-direction: column; gap: 0.75rem; }
      .pyr3-cat-pane {
        aspect-ratio: 1 / 1;
        background: var(--bar-bg-3);
        border: 1px solid var(--bar-border);
        border-radius: 4px;
        position: relative;
        overflow: hidden;
      }
      .pyr3-cat-pane svg, .pyr3-cat-flame-canvas { width: 100%; height: 100%; display: block; }
      .pyr3-cat-pane-label {
        position: absolute;
        bottom: 0.5rem;
        left: 0.65rem;
        font-family: ui-monospace, monospace;
        font-size: 0.68rem;
        color: var(--text-dim);
      }
      .pyr3-cat-live-dot {
        position: absolute;
        top: 0.55rem;
        right: 0.65rem;
        font-family: ui-monospace, monospace;
        font-size: 0.62rem;
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        gap: 0.32rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .pyr3-cat-live-dot.hidden { display: none; }
      .pyr3-cat-live-dot::before {
        content: '';
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: pyr3-cat-pulse 1.6s ease-in-out infinite;
      }
      @keyframes pyr3-cat-pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
      .pyr3-cat-warp-na {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1rem;
        color: var(--text-dim);
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        font-style: italic;
      }

      .pyr3-cat-controls {
        background: var(--bar-bg-2);
        border: 1px solid var(--bar-border);
        border-radius: 4px;
        padding: 0.7rem 0.85rem;
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
      }
      .pyr3-cat-control-row {
        display: grid;
        grid-template-columns: 6.8rem 1fr 2.6rem 1.1rem;
        align-items: center;
        gap: 0.55rem;
        padding: 0.22rem 0;
      }
      .pyr3-cat-control-row .pyr3-cat-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pyr3-cat-control-row .pyr3-cat-label { color: var(--text-muted); }
      .pyr3-cat-control-row .pyr3-cat-label.weight { color: var(--text); }
      .pyr3-cat-control-row .pyr3-cat-val { text-align: right; color: var(--text); }
      .pyr3-cat-reset { color: var(--text-dim); cursor: pointer; text-align: center; user-select: none; transition: color 0.12s; }
      .pyr3-cat-reset:hover { color: var(--accent); }
      input.pyr3-cat-scrub {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: linear-gradient(to right, var(--accent) var(--p, 100%), var(--bar-bg-3) var(--p, 100%));
        border-radius: 2px;
        outline: none;
      }
      input.pyr3-cat-scrub::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px; height: 12px;
        background: var(--text);
        border: 1px solid var(--accent-border);
        border-radius: 50%;
        cursor: ew-resize;
      }
      input.pyr3-cat-scrub::-moz-range-thumb {
        width: 12px; height: 12px;
        background: var(--text);
        border: 1px solid var(--accent-border);
        border-radius: 50%;
        cursor: ew-resize;
      }
      .pyr3-cat-controls-footer { margin-top: 0.5rem; display: flex; justify-content: flex-end; }
      .pyr3-cat-reset-all {
        font-family: ui-monospace, monospace;
        font-size: 0.72rem;
        color: var(--text-dim);
        background: transparent;
        border: 1px solid var(--bar-border);
        padding: 0.25rem 0.7rem;
        border-radius: 3px;
        cursor: pointer;
        transition: color 0.12s, border-color 0.12s;
      }
      .pyr3-cat-reset-all:hover { color: var(--accent); border-color: var(--accent-border); }
      .pyr3-cat-controls-empty {
        padding: 0.7rem 0.85rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.78rem;
        color: var(--text-dim);
        font-style: italic;
        border: 1px dashed var(--bar-border);
        border-radius: 4px;
        text-align: center;
      }

      .pyr3-cat-section-blurb {
        color: var(--text-muted);
        max-width: 64ch;
        margin: 1.2rem 0 0;
        line-height: 1.55;
      }
      .pyr3-cat-open-link {
        display: inline-block;
        margin-top: 0.9rem;
        font-family: ui-monospace, monospace;
        font-size: 0.82rem;
        color: var(--accent);
        text-decoration: none;
      }
      .pyr3-cat-open-link:hover { text-decoration: underline; }

      .pyr3-cat-stub {
        padding: 2rem 0;
        border-bottom: 1px solid var(--bar-border);
        text-align: center;
        color: var(--text-dim);
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        scroll-margin-top: 1rem;
      }
      .pyr3-cat-stub-name { color: var(--text-muted); font-size: 1rem; margin-bottom: 0.4rem; }
      .pyr3-cat-stub-vnum { color: var(--text-dim); margin-left: 0.35rem; }
      .pyr3-cat-stub-note { font-style: italic; font-size: 0.78rem; }

      /* SVG warp styling — matches the brainstorm mockup */
      svg .warp-line { stroke: #6e6e7a; stroke-width: 0.012; fill: none; }
      svg .warp-axis { stroke: #34343e; stroke-width: 0.015; }

      /* First-paint cue: a quiet "dreaming…" in the canvas zone on cold
         load, cleared once the first flame paints. Not an overlay on a
         rendered flame — there is none yet at first paint. */
      #pyr3-firstpaint {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #7a6a55;
        font-size: 13px;
        font-style: italic;
        letter-spacing: 0.04em;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      #pyr3-firstpaint.hidden { opacity: 0; }
      body.webgpu-unavailable #pyr3-firstpaint { display: none; }

      /* Graceful corpus missing-sheep state (PYR3-039) — covers the canvas,
         keeps all three bars; the action-bar nav offers prev/next. */
      #pyr3-missing {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        text-align: center;
        padding: 24px;
        background: var(--bg);
      }
      #pyr3-missing[hidden] { display: none; }
      #pyr3-missing .pyr3-missing-coord {
        font-family: ui-monospace, monospace;
        font-size: 14px;
        color: var(--text-muted);
      }
      #pyr3-missing .pyr3-missing-msg {
        font-size: 13px;
        color: var(--text-dim);
        max-width: 520px;
        line-height: 1.6;
      }
      #pyr3-missing .pyr3-missing-report {
        font-size: 12px;
        color: var(--accent, #ff8c1a);
        text-decoration: none;
        border: 1px solid var(--accent-border, rgba(255, 140, 26, 0.4));
        border-radius: 999px;
        padding: 3px 12px;
        margin-top: 4px;
      }
      #pyr3-missing .pyr3-missing-report[hidden] { display: none; }
      #pyr3-missing .pyr3-missing-report:hover { background: var(--accent, #ff8c1a); color: #0a0a0c; }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }

      #pyr3-app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
      }

      #pyr3-bar {
        flex: 0 0 auto;
      }

      #pyr3-canvas-zone {
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        background: var(--bg);
        position: relative;
      }

      #pyr3-canvas {
        display: block;
        /* Fit-and-preserve-aspect: canvas fills the available zone in BOTH
           dimensions, with `object-fit: contain` enforcing the canvas's
           intrinsic aspect (from canvas.width/height set by main.ts). On
           wide viewports the canvas grows until height is binding (letterbox
           left/right); on tall viewports until width is binding (letterbox
           top/bottom). Always as big as possible, never stretched. */
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #pyr3-fallback {
        display: none;
        max-width: 560px;
        padding: 28px 30px;
        margin: 24px;
        background: var(--bar-bg-1);
        border: 1px solid rgba(255, 122, 122, 0.4);
        border-radius: 8px;
        color: var(--text);
      }
      #pyr3-fallback[hidden] { display: none; }
      #pyr3-fallback:not([hidden]) { display: block; }
      #pyr3-fallback h2 {
        color: var(--err);
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 12px;
      }
      #pyr3-fallback p {
        font-size: 13px;
        line-height: 1.55;
        margin: 8px 0;
      }
      #pyr3-fallback p.fix { color: var(--text-muted); margin-top: 14px; }
      #pyr3-fallback ul {
        margin: 8px 0 14px;
        padding-left: 20px;
        font-size: 13px;
        line-height: 1.55;
      }
      #pyr3-fallback ul li { margin: 3px 0; }
      #pyr3-fallback strong { color: var(--text); }
      #pyr3-fallback a.cta {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 14px;
        background: var(--accent-soft);
        border: 1px solid var(--accent-border);
        border-radius: 4px;
        color: #ffb56e;
        font-size: 13px;
        text-decoration: none;
      }
      #pyr3-fallback a.cta:hover { background: rgba(255, 140, 26, 0.28); }

      #pyr3-error {
        display: none;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: #1a0a0a;
        color: #ff8a8a;
        font-family: ui-monospace, monospace;
        white-space: pre-wrap;
        text-align: center;
      }

      #pyr3-error.visible {
        display: flex;
      }

      /* ── Surprise Wall (/surprise) ───────────────────────────────────── */
      #pyr3-surprise[hidden] { display: none; }
      body.pyr3-surprise-mode #pyr3-canvas,
      body.pyr3-surprise-mode #pyr3-firstpaint,
      body.pyr3-surprise-mode #pyr3-gallery,
      body.pyr3-surprise-mode #pyr3-fallback,
      body.pyr3-surprise-mode #pyr3-missing { display: none !important; }
      body.pyr3-surprise-mode .pyr3-bar-info,
      body.pyr3-surprise-mode .pyr3-bar-action { display: none !important; }

      #pyr3-surprise {
        position: absolute;
        inset: 0;
        overflow: auto;
      }
      .pyr3-surprise-root {
        display: grid;
        grid-template-columns: 1fr 280px;
        grid-template-rows: auto 1fr;
        grid-template-areas: "controls tray" "wall tray";
        height: 100%;
        width: 100%;
      }
      .pyr3-surprise-controls {
        grid-area: controls;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.85rem 1.1rem;
        border-bottom: 1px solid var(--bar-border);
        background: var(--bar-bg-2);
      }
      .pyr3-surprise-more {
        background: var(--accent, #c97);
        color: #1a1a1a;
        border: none;
        border-radius: 4px;
        padding: 0.5rem 0.95rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: filter 0.12s;
      }
      .pyr3-surprise-more:hover { filter: brightness(1.12); }
      .pyr3-surprise-status {
        font-family: ui-monospace, monospace;
        font-size: 0.78rem;
        color: var(--text-dim);
        letter-spacing: 0.02em;
      }
      .pyr3-surprise-wall {
        grid-area: wall;
        display: grid;
        /* Fixed 320px columns = the thumbnail's native render size (THUMB_DIM),
           so tiles never stretch/shrink with the window — they stay 1:1 with the
           rendered pixels regardless of viewport width. */
        grid-template-columns: repeat(auto-fill, 320px);
        grid-auto-rows: min-content;
        gap: 0.6rem;
        padding: 0.9rem 1.1rem;
        align-content: start;
        justify-content: start;
        overflow-y: auto;
      }
      .pyr3-surprise-tile {
        position: relative;
        width: 320px;
        height: 320px;
        background: #000;
        border: 1px solid var(--bar-border);
        border-radius: 3px;
        overflow: hidden;
      }
      .pyr3-surprise-tile canvas {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: auto;
      }
      .pyr3-surprise-tile.pending::after {
        content: "…";
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-dim);
        font-family: ui-monospace, monospace;
        font-size: 1.4rem;
      }
      .pyr3-surprise-tile .pyr3-tile-open,
      .pyr3-surprise-tile .pyr3-tile-keep,
      .pyr3-surprise-tile .pyr3-tile-reroll {
        position: absolute;
        top: 4px;
        background: rgba(0, 0, 0, 0.55);
        border: none;
        border-radius: 3px;
        color: #fff;
        font-size: 0.85rem;
        line-height: 1;
        padding: 3px 5px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.12s;
      }
      /* ↗ link-out sits in the upper-right corner; ⭐ keep + ✕ reroll to its left. */
      .pyr3-surprise-tile .pyr3-tile-open { right: 4px; font-weight: 700; }
      .pyr3-surprise-tile .pyr3-tile-keep { right: 30px; }
      .pyr3-surprise-tile .pyr3-tile-reroll { right: 56px; }
      .pyr3-surprise-tile .pyr3-tile-open:hover { background: var(--accent, #c97); color: #1a1a1a; }
      .pyr3-surprise-tile:hover .pyr3-tile-open,
      .pyr3-surprise-tile:hover .pyr3-tile-keep,
      .pyr3-surprise-tile:hover .pyr3-tile-reroll { opacity: 1; }
      .pyr3-surprise-tile .pyr3-tile-label {
        position: absolute;
        left: 0; right: 0; bottom: 0;
        padding: 3px 6px;
        font-family: ui-monospace, monospace;
        font-size: 0.68rem;
        color: #eee;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pyr3-surprise-tray {
        grid-area: tray;
        border-left: 1px solid var(--bar-border);
        background: var(--bar-bg-1);
        padding: 0.85rem 0.9rem;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
      }
      .pyr3-surprise-tray h2 {
        font-family: ui-monospace, monospace;
        font-size: 0.74rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin: 0 0 0.3rem;
      }
      .pyr3-tray-empty {
        font-family: ui-monospace, monospace;
        font-size: 0.74rem;
        color: var(--text-muted);
        font-style: italic;
        line-height: 1.5;
      }
      .pyr3-kept {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.5rem;
        background: var(--bar-bg-3);
        border: 1px solid var(--bar-border);
        border-radius: 3px;
      }
      .pyr3-kept-label {
        flex: 1;
        font-family: ui-monospace, monospace;
        font-size: 0.74rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pyr3-kept button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 2px 3px;
      }
    </style>
  </head>
  <body>
    <div id="pyr3-app">
      <header id="pyr3-bar"></header>
      <main id="pyr3-canvas-zone">
        <canvas id="pyr3-canvas"></canvas>
        <div id="pyr3-firstpaint">dreaming…</div>
        <div id="pyr3-fallback" hidden></div>
        <div id="pyr3-gallery" hidden></div>
        <div id="pyr3-edit" hidden></div>
        <div id="pyr3-variations" hidden></div>
        <div id="pyr3-surprise" hidden></div>
      </main>
    </div>
    <div id="pyr3-error" role="alert"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
