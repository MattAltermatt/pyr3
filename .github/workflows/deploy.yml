name: Deploy site to GitHub Pages

# Automates the previously-manual build -> bake-chunks -> publish flow
# (PYR3-038). Replaces the hand-run `vite build` + force-push to the
# `gh-pages` branch. Requires Settings -> Pages -> Source = "GitHub Actions".
#
# The custom domain (pyr3.app) and Enforce-HTTPS are repo-level Pages
# settings, independent of the publishing source, so they survive the
# source switch. The old `gh-pages` branch is left intact as a rollback.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege for the official Pages deploy path:
# - contents:read   checkout the source
# - pages:write     publish the Pages artifact
# - id-token:write  OIDC token actions/deploy-pages exchanges for the deploy
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # PYR3-062: gate the live deploy on typecheck + unit tests. Before this, a
  # push to main went straight to `npm run build` -> live with no test run, so
  # a unit regression or a bin/ type error could auto-deploy to production.
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (src + bin)
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  build:
    needs: verify
    runs-on: ubuntu-latest
    env:
      # Pinned electric-sheep-fold Release tag carrying corpus-chunks-genome-*.tar.
      # Bump this ONE line to ship a newer corpus snapshot to the live site.
      # Pinning (vs --latest) keeps deploys reproducible: a re-run always
      # bakes in the same chunks, and a future ESF release can't silently
      # change what pyr3 serves. ESF v0.7 (2026-06-01): genome-only tar carries
      # 52,365 sheep (52,284 standalones + 81 promoted orphan keyframes); the
      # index.json schema bumped to v7 with thumb_hash + is_thumb_representative
      # for the dedup-aware gallery filter (#49).
      CHUNK_RELEASE_TAG: '2026-06-01'
      # #14 — integrity gate: expected sha256 of corpus-chunks-genome-{tag}.tar,
      # verified before `tar -xf` (covers the cached path too). Tag-pinning fixes
      # WHICH tag, not WHICH bytes — a same-tag asset can be deleted + re-uploaded,
      # and actions/cache would amplify a poisoned tar. Bump this WITH the tag above.
      # #405: same-tag re-upload — only features.flam3idx changed (schema v1→v2,
      # variation bitset 128→512 bits; transcoded offline via
      # bin/pyr3-convert-feature-index.ts, lossless across all 52,175 records, every
      # other corpus file byte-identical). Bumped to unblock the #393-D v2-only client.
      CHUNK_TAR_SHA256: '2ffa0f6bc14b03f12369b4ebded9e2e7557879822f025494a35c847601065971'
      # Pinned pyr3 Release tag carrying showcase-*.tar (the 4K /showcase
      # gallery: 54 4k.jpg + 54 thumb.jpg + index.html). Bump this ONE line
      # to ship a regenerated gallery. The bundle is gitignored
      # (public/showcase/) and lives only here as a Release asset — never in
      # git — so the repo stays lean. Same reproducibility rationale as the
      # chunk tag above.
      SHOWCASE_RELEASE_TAG: 'showcase-2026-06-26'
      # #14 — expected sha256 of showcase-{tag}.tar (it carries a same-origin
      # index.html served at /showcase/, so integrity matters most here). Verified
      # before `tar -xf`. Bump WITH the showcase tag above.
      SHOWCASE_TAR_SHA256: '286d76b73289b50a8beb828868b420d4a91d74c01483dbffb1112f656cdad22b'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsc (typecheck) + vite build, base '/'. public/CNAME is copied into
      # dist/ automatically (harmless under the Actions source, which holds
      # the domain in Settings rather than reading a CNAME file).
      - name: Build site
        run: npm run build

      # Cache the downloaded chunk tar, keyed on the pinned Release tag.
      # The corpus changes rarely, so FE-only deploys hit this cache and skip
      # the download entirely; it only misses the one deploy after the tag is
      # bumped. The tar still gets untarred into the artifact every deploy
      # (the Pages artifact is a complete site snapshot — see header note).
      - name: Restore cached corpus-chunks tar
        id: chunk-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/esf-chunks
          # Key on (tag, sha) so a same-tag re-upload (asset deleted + replaced)
          # busts the cache automatically — bumping CHUNK_TAR_SHA256 alone is enough.
          key: esf-chunks-${{ env.CHUNK_RELEASE_TAG }}-${{ env.CHUNK_TAR_SHA256 }}

      # Same-origin corpus chunks the /v1 share-URL viewer fetches at runtime.
      # electric-sheep-fold is PUBLIC, so the repo-scoped github.token can read
      # its Release assets (public-repo reads work with any valid token).
      # Only downloads on a cache miss (first deploy after a tag bump).
      - name: Download corpus chunks from electric-sheep-fold
        if: steps.chunk-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/esf-chunks
          gh release download "$CHUNK_RELEASE_TAG" \
            --repo MattAltermatt/electric-sheep-fold \
            --pattern 'corpus-chunks-genome-*.tar' \
            --dir /tmp/esf-chunks

      # Unpack into the artifact every deploy (cached or freshly downloaded).
      - name: Verify + bake chunks into dist/
        run: |
          TAR=$(ls /tmp/esf-chunks/corpus-chunks-genome-*.tar)
          echo "${CHUNK_TAR_SHA256}  ${TAR}" | sha256sum -c -   # fails the deploy on mismatch
          mkdir -p dist/chunks
          tar -xf "$TAR" -C dist/chunks
          echo "Baked chunk tree (top level):"
          ls dist/chunks

      # Cache the showcase tar, keyed on the pinned Release tag. Same logic as
      # the chunk cache: the gallery changes rarely, so code/FE deploys hit the
      # cache and skip the 220M download; only the first deploy after a tag bump
      # misses. The tar is still untarred into the artifact every deploy.
      - name: Restore cached showcase tar
        id: showcase-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/showcase
          key: showcase-${{ env.SHOWCASE_RELEASE_TAG }}

      # The /showcase gallery, fetched from pyr3's OWN Releases. The bundle is
      # gitignored, so the clean CI checkout doesn't have it — same problem and
      # same solution as the corpus chunks above. The repo-scoped github.token
      # reads pyr3's own Release assets. Only downloads on a cache miss.
      - name: Download showcase bundle from pyr3 Releases
        if: steps.showcase-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/showcase
          gh release download "$SHOWCASE_RELEASE_TAG" \
            --repo MattAltermatt/pyr3 \
            --pattern 'showcase-*.tar' \
            --dir /tmp/showcase

      # Unpack into the artifact every deploy. The tar root is "showcase/", so
      # this lands dist/showcase/ → served at https://pyr3.app/showcase/.
      - name: Verify + bake showcase into dist/
        run: |
          TAR=$(ls /tmp/showcase/showcase-*.tar)
          echo "${SHOWCASE_TAR_SHA256}  ${TAR}" | sha256sum -c -   # fails the deploy on mismatch
          tar -xf "$TAR" -C dist
          echo "Baked showcase (file count):"
          ls dist/showcase | wc -l

      # 404.html = SPA deep-link fallback for /v1/gen/... paths.
      # .nojekyll bypasses Jekyll (belt-and-suspenders; Actions source skips it).
      - name: SPA deep-link fallback + Jekyll bypass
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
