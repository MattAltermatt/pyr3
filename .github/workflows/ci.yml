name: CI

# PYR3-062: a real quality gate. Before this, deploy.yml was the only workflow
# and it went push-to-main -> `npm run build` -> live, never running the unit
# suite or the bin/ typecheck — a unit regression or a CLI type error could
# auto-deploy to production. This runs on every push + PR.
#
# The gated parity rigs (test:parity / test:parity-fe-be) are NOT run here: they
# need a real/software GPU and take ~91s / ~13min. They stay opt-in (run locally
# when the render path changes).

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 26 (#63): parity with local dev. Local devs land on the same
          # major via .nvmrc, so test code that touches Node-version-gated
          # globals (like Storage / Storage.prototype, added with the
          # --localstorage-file path in 26) doesn't pass locally then crash
          # CI. Also covers the older Node 24 brotli requirement (the suite
          # exercises native DecompressionStream("brotli")).
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Covers the src engine/viewer (tsconfig.json), the bin/ CLI seam
      # (tsconfig.bin.json), AND the engine-only no-DOM tsconfig
      # (tsconfig.engine.json, #15). The last one fails the build if any
      # kernel module ever references a browser global — enforces the
      # "single engine, two consumers" seam at compile time.
      - name: Typecheck (src + bin + engine)
        run: npm run typecheck

      - name: Unit tests
        run: npm test
